services:

  # ── Development server (hot-reload) ───────────────────────────────────────
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev

  # ── Production build + nginx serve ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
