services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       liquidflow
      POSTGRES_USER:     liquidflow
      POSTGRES_PASSWORD: liquidflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquidflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js dev server ─────────────────────────────────────────────────────
  dev:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npx prisma migrate deploy && npm run dev"
    profiles:
      - dev

  # ── Production build ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
  postgres_data:
